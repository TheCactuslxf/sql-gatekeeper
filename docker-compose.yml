version: "3.9"

services:
  meta-db:
    image: mysql:8.0
    container_name: sql-gatekeeper-meta-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gatekeeper_meta
      MYSQL_USER: gatekeeper
      MYSQL_PASSWORD: gatekeeper
    ports:
      - "33061:3306"
    volumes:
      - ./docker/mysql-init/meta:/docker-entrypoint-initdb.d
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password"]

  biz-user-db:
    image: mysql:8.0
    container_name: sql-gatekeeper-biz-user-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: biz_user
      MYSQL_USER: readonly
      MYSQL_PASSWORD: readonly
    ports:
      - "33062:3306"
    volumes:
      - ./docker/mysql-init/userdb:/docker-entrypoint-initdb.d
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password"]

  biz-order-db:
    image: mysql:8.0
    container_name: sql-gatekeeper-biz-order-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: biz_order
      MYSQL_USER: readonly
      MYSQL_PASSWORD: readonly
    ports:
      - "33063:3306"
    volumes:
      - ./docker/mysql-init/orderdb:/docker-entrypoint-initdb.d
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password"]

